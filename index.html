<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Parts Stock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0e4d0;
    min-height: 100vh;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 30px 20px 10px;
  }
  header h1 {
    font-size: 2rem;
    color: #5a3e28;
    margin-bottom: 6px;
  }
  header p {
    color: #8b6a4a;
    font-size: 0.95rem;
  }

  .search-bar {
    max-width: 700px;
    margin: 24px auto 12px;
    display: flex;
    gap: 10px;
  }
  .search-bar input {
    flex: 1;
    padding: 12px 18px;
    border: 2px solid #d4bc9a;
    border-radius: 30px;
    font-size: 1rem;
    background: white;
    outline: none;
  }
  .search-bar input:focus { border-color: #b57c48; }
  .search-bar button {
    padding: 12px 22px;
    background: #b57c48;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .search-bar button:hover { background: #9a6538; }

  .stats {
    text-align: center;
    color: #8b6a4a;
    margin-bottom: 20px;
    font-size: 0.9rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: #fffaf3;
    border: 2px solid #e2cfb5;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(90,62,40,0.15); }

  .card-photo-wrap {
    width: 100%;
    height: 200px;
    background: #f5ede3;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-bottom: 1px solid #e2cfb5;
  }
  .card-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .card-no-photo {
    font-size: 3rem;
    color: #c8a87a;
  }

  .card-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-name {
    font-size: 1rem;
    font-weight: bold;
    color: #3d2b1a;
    line-height: 1.3;
  }

  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .badge {
    background: #f0e4d0;
    border: 1px solid #d4bc9a;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.8rem;
    color: #5a3e28;
  }
  .badge.qty {
    background: #d4edda;
    border-color: #9ecfaa;
    color: #2d6a4f;
    font-weight: bold;
  }
  .badge.qty.low {
    background: #fde8d8;
    border-color: #f0a87a;
    color: #a04020;
  }

  .card-notes {
    font-size: 0.82rem;
    color: #7a5c3c;
    border-top: 1px solid #edd9c0;
    padding-top: 8px;
    line-height: 1.4;
  }

  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: #8b6a4a;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2cfb5;
    border-top-color: #b57c48;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: #8b6a4a;
    font-size: 1.1rem;
  }

  footer {
    text-align: center;
    padding: 30px;
    color: #b09070;
    font-size: 0.8rem;
    margin-top: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>🔧 Electronic Parts Stock</h1>
  <p>Search parts by name, part number, or storage location</p>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 Search: transistor, SMD, R-10K..." oninput="filterParts()">
  <button onclick="loadParts()">🔄 Refresh</button>
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid">
  <div class="loading">
    <div class="spinner"></div>
    Loading parts...
  </div>
</div>

<footer>Electronic Repairs — Parts Inventory &nbsp;|&nbsp; Read-only view &nbsp;|&nbsp; V.Colsatchi</footer>

<script>
const SUPABASE_URL = "https://wfzncfukrtphinguasqn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indmem5jZnVrcnRwaGluZ3Vhc3FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Nzg4MzYsImV4cCI6MjA5MTA1NDgzNn0.MknuBPHrtfEM6H-B_HGkGp5AfDNvJr1jFV0Y3yTFP9Y";

let allParts = [];

async function loadParts() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading parts...</div>';
  document.getElementById('stats').textContent = '';

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/radio_parts?select=*&order=name.asc`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );
    if (!res.ok) throw new Error("HTTP " + res.status);
    allParts = await res.json();
    filterParts();
  } catch(e) {
    grid.innerHTML = '<div class="empty">⚠️ Could not load data.<br><small>' + e.message + '</small></div>';
  }
}

function filterParts() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = term
    ? allParts.filter(p =>
        (p.name || '').toLowerCase().includes(term) ||
        (p.part_number || '').toLowerCase().includes(term) ||
        (p.cell_text || '').toLowerCase().includes(term) ||
        (p.notes || '').toLowerCase().includes(term)
      )
    : allParts;

  document.getElementById('stats').textContent =
    term ? ('Showing ' + filtered.length + ' of ' + allParts.length + ' parts')
         : (allParts.length + ' parts in stock');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">🔍 No parts found</div>';
    return;
  }

  filtered.forEach(function(p) {
    const qty = p.quantity != null ? p.quantity : 0;

    // Card
    const card = document.createElement('div');
    card.className = 'card';

    // Photo wrapper
    const photoWrap = document.createElement('div');
    photoWrap.className = 'card-photo-wrap';

    const img = document.createElement('img');
    img.alt = p.name;
    img.src = SUPABASE_URL + '/storage/v1/object/public/part_photos/' + p.id + '.jpg';
    img.onerror = function() {
      photoWrap.innerHTML = '<div class="card-no-photo">📦</div>';
    };
    photoWrap.appendChild(img);
    card.appendChild(photoWrap);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    // Name
    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = p.name;
    body.appendChild(nameEl);

    // Badges
    const badges = document.createElement('div');
    badges.className = 'card-badges';

    const b1 = document.createElement('span');
    b1.className = 'badge';
    b1.textContent = '🔢 ' + (p.part_number || '—');
    badges.appendChild(b1);

    const b2 = document.createElement('span');
    b2.className = 'badge';
    b2.textContent = '📍 ' + (p.cell_text || '—');
    badges.appendChild(b2);

    const b3 = document.createElement('span');
    b3.className = 'badge qty' + (qty < 10 ? ' low' : '');
    b3.textContent = '📦 ' + qty + ' pcs';
    badges.appendChild(b3);

    body.appendChild(badges);

    // Notes
    if (p.notes && p.notes.trim()) {
      const notes = document.createElement('div');
      notes.className = 'card-notes';
      notes.textContent = '📝 ' + p.notes;
      body.appendChild(notes);
    }

    card.appendChild(body);
    grid.appendChild(card);
  });
}

loadParts();
</script>
</body>
</html>
